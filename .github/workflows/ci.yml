name: Release-X CI Pipeline

on:
  push:
    branches:
      - main
    paths-ignore:
      - "kubernetes/**"

  pull_request:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  ci:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      # ---------------- Checkout ----------------

      - name: Checkout Repository
        uses: actions/checkout@v4

      # ---------------- Security Scans ----------------

      - name: Run Trivy Scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          format: table
          output: trivy-report.txt

      - name: OWASP Dependency Check
        continue-on-error: true
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: release-x
          path: .
          format: HTML
          out: dependency-check-report

      # ---------------- SonarQube ----------------

      - name: SonarQube Scan
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v2
        with:
          args: >
            -Dsonar.projectKey=release-x
            -Dsonar.projectName=release-x
            -Dsonar.sources=backend,frontend
        env:
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # ---------------- Docker Login ----------------

      - name: Docker Login
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------- Docker Build ----------------

      - name: Build Backend Image
        run: |
          docker build \
            -t bhaveshkapur09/wanderlust-backend-beta:${{ github.sha }} \
            ./backend

      - name: Build Frontend Image
        run: |
          docker build \
            -t bhaveshkapur09/wanderlust-frontend-beta:${{ github.sha }} \
            ./frontend

      # ---------------- Docker Push ----------------

      - name: Push Backend Image
        if: github.event_name != 'pull_request'
        run: |
          docker push bhaveshkapur09/wanderlust-backend-beta:${{ github.sha }}

      - name: Push Frontend Image
        if: github.event_name != 'pull_request'
        run: |
          docker push bhaveshkapur09/wanderlust-frontend-beta:${{ github.sha }}

      # ---------------- Upload Reports ----------------

      - name: Upload Security Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            trivy-report.txt
            dependency-check-report
