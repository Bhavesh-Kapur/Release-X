apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-deployment
  namespace: release-x
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: backend
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: bhaveshkapur09/wanderlust-backend-beta:bc9ddec37ae50da10067ef4aa48218d5ece834d8
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: release-x
spec:
  type: NodePort
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      nodePort: 31100
